<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Dealer Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #e94560;
      --accent-dark: #c73652;
      --bg: #1a1a2e;
      --card: #16213e;
      --card-active: #1f2d50;
      --text: #e0e0e0;
      --muted: #888;
      --border: #333;
      --overall: #4a90d9;
      --overall-border: #1a3a6a;
      --overall-bg: #0d1624;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      /* prevent rubber-band scroll pulling content out of view on iOS */
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation; /* disables double-tap-to-zoom on the whole page */
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: clamp(16px, 4vw, 28px);
      width: 100%;
      max-width: 480px;
      padding: clamp(24px, 6vw, 48px) clamp(20px, 5vw, 32px);
      /* safe-area insets for notched phones */
      padding-top: max(clamp(24px, 6vw, 48px), env(safe-area-inset-top));
      padding-bottom: max(clamp(24px, 6vw, 48px), env(safe-area-inset-bottom));
      padding-left: max(clamp(20px, 5vw, 32px), env(safe-area-inset-left));
      padding-right: max(clamp(20px, 5vw, 32px), env(safe-area-inset-right));
    }
    .screen.active { display: flex; }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fff;
      text-align: center;
    }

    p.subtitle {
      color: var(--muted);
      font-size: clamp(0.9rem, 3vw, 1rem);
      text-align: center;
    }

    /* ── Player count buttons ── */
    .count-buttons {
      display: flex;
      gap: clamp(12px, 3vw, 20px);
    }

    .count-btn {
      width: clamp(80px, 20vw, 100px);
      height: clamp(80px, 20vw, 100px);
      border-radius: 18px;
      border: 2px solid #444;
      background: var(--card);
      color: var(--text);
      font-size: clamp(1.8rem, 5vw, 2.2rem);
      font-weight: 700;
      cursor: pointer;
      /* touch-action already set on body, but belt-and-suspenders */
      touch-action: manipulation;
      transition: border-color 0.15s, background 0.15s;
      /* min 44px is Apple's touch target guideline; we exceed it */
      min-width: 44px;
      min-height: 44px;
    }
    /* active state covers both mouse-click and finger-tap */
    .count-btn:active {
      border-color: var(--accent);
      background: var(--card-active);
    }
    @media (hover: hover) {
      .count-btn:hover {
        border-color: var(--accent);
        background: var(--card-active);
      }
    }

    /* ── Name inputs ── */
    .name-inputs {
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 2.5vw, 14px);
      width: 100%;
    }

    .name-inputs input {
      width: 100%;
      padding: clamp(14px, 3.5vw, 16px) 16px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--card);
      color: #fff;
      font-size: clamp(1rem, 3.5vw, 1.1rem);
      outline: none;
      transition: border-color 0.15s;
      /* prevent iOS auto-zoom (requires font-size >= 16px equivalent) */
      -webkit-text-size-adjust: 100%;
    }
    .name-inputs input:focus { border-color: var(--accent); }
    .name-inputs input::placeholder { color: #555; }

    /* ── Primary action button ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: clamp(14px, 3.5vw, 18px) 32px;
      border-radius: 14px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: clamp(1rem, 3.5vw, 1.1rem);
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.15s;
      width: 100%;
      min-height: 56px; /* comfortably tappable */
      letter-spacing: 0.02em;
    }
    .btn:active { background: var(--accent-dark); }
    @media (hover: hover) {
      .btn:hover { background: var(--accent-dark); }
    }

    /* ── Dealer screen ── */
    .dealer-label {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .player-list {
      display: flex;
      flex-direction: column;
      gap: clamp(8px, 2vw, 12px);
      width: 100%;
    }

    .player-item {
      padding: clamp(10px, 3vw, 14px) clamp(16px, 4vw, 22px);
      border-radius: 14px;
      background: var(--card);
      border: 2px solid transparent;
      font-size: clamp(1rem, 3.5vw, 1.1rem);
      font-weight: 500;
      color: #aaa;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .player-item .player-name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .player-item .badge {
      visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--accent);
      color: #fff;
      padding: 4px 10px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .player-item.active {
      background: var(--card-active);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
    }
    .player-item.active .badge { visibility: visible; }

    /* ── Score inputs ── */
    .score-input {
      width: clamp(60px, 14vw, 76px);
      flex-shrink: 0;
      padding: 8px 6px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: var(--bg);
      color: #fff;
      font-size: 16px; /* ≥16px prevents iOS auto-zoom */
      font-weight: 600;
      text-align: center;
      outline: none;
      transition: border-color 0.15s;
      /* hide spin arrows */
      -moz-appearance: textfield;
    }
    .score-input::-webkit-outer-spin-button,
    .score-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .score-input:focus { border-color: var(--accent); }
    .player-item.active .score-input:not(.overall) { border-color: #c73652; background: #12192e; }

    .score-input.overall {
      border-color: var(--overall-border);
      background: var(--overall-bg);
    }
    .score-input.overall:focus { border-color: var(--overall); }
    .player-item.active .score-input.overall { border-color: #1a4a8a; background: #09111e; }

    /* ── Score column headers ── */
    .score-col-header {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 0 clamp(16px, 4vw, 22px);
    }
    .score-col-header .sch-spacer { flex: 1; }
    .score-col-header .sch-badge { flex-shrink: 0; }
    .score-col-header .sch-label {
      width: clamp(60px, 14vw, 76px);
      flex-shrink: 0;
      text-align: center;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .score-col-header .sch-label.overall { color: var(--overall); }

    /* ── Drag handle ── */
    .drag-handle {
      cursor: grab;
      color: var(--muted);
      font-size: 1.1rem;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      line-height: 1;
    }
    .drag-handle:active { cursor: grabbing; }

    .player-item.dragging { opacity: 0.35; }
    .player-item.drag-over {
      border-color: var(--accent) !important;
      background: var(--card-active) !important;
    }

    .score-col-header .sch-handle-spacer { width: 20px; flex-shrink: 0; }

    /* ── Tablet / large phone tweaks ── */
    @media (min-width: 600px) {
      .screen { gap: 32px; }
    }

    /* ── Landscape phone: shrink vertical gaps so everything fits ── */
    @media (max-height: 500px) and (orientation: landscape) {
      .screen { gap: 12px; padding-top: 16px; padding-bottom: 16px; }
      h1 { font-size: 1.3rem; }
      .count-btn { width: 64px; height: 64px; font-size: 1.5rem; }
      .player-item { padding: 8px 14px; }
      .score-input { padding: 6px 8px; }
      .btn { min-height: 48px; padding: 10px 24px; }
    }
  </style>
</head>
<body>

  <!-- Screen 1: How many players? -->
  <div class="screen active" id="screen-count">
    <h1>Dealer Tracker</h1>
    <p class="subtitle">How many players?</p>
    <div class="count-buttons">
      <button class="count-btn" onclick="setCount(2)">2</button>
      <button class="count-btn" onclick="setCount(3)">3</button>
      <button class="count-btn" onclick="setCount(4)">4</button>
    </div>
  </div>

  <!-- Screen 2: Enter names -->
  <div class="screen" id="screen-names">
    <h1>Player Names</h1>
    <p class="subtitle">Enter a name for each player</p>
    <div class="name-inputs" id="name-inputs"></div>
    <button class="btn" onclick="startGame()">Start</button>
  </div>

  <!-- Screen 3: Dealer tracker -->
  <div class="screen" id="screen-dealer">
    <h1>Next Dealer</h1>
    <span class="dealer-label">Players</span>
    <div class="score-col-header" id="score-col-header"></div>
    <div class="player-list" id="player-list"></div>
    <button class="btn" onclick="nextDealer()"><span>Next Dealer</span> <span>&rarr;</span></button>
  </div>

  <script>
    let playerCount = 0;
    let players = [];
    let scores = [];
    let overallScores = [];
    let dealerIndex = 0;
    let dragSrcIndex = null;

    function show(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0, 0);
    }

    function setCount(n) {
      playerCount = n;
      const container = document.getElementById('name-inputs');
      container.innerHTML = '';
      for (let i = 0; i < n; i++) {
        const input = document.createElement('input');
        input.type = 'text';
        input.style.fontSize = '16px';
        input.placeholder = `Player ${i + 1}`;
        input.id = `name-${i}`;
        input.setAttribute('enterkeyhint', i < n - 1 ? 'next' : 'done');
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') {
            e.preventDefault();
            const next = document.getElementById(`name-${i + 1}`);
            if (next) next.focus(); else startGame();
          }
        });
        container.appendChild(input);
      }
      show('screen-names');
      setTimeout(() => document.getElementById('name-0').focus(), 50);
    }

    function startGame() {
      document.activeElement && document.activeElement.blur();
      players = [];
      scores = [];
      overallScores = [];
      for (let i = 0; i < playerCount; i++) {
        const val = document.getElementById(`name-${i}`).value.trim();
        players.push(val || `Player ${i + 1}`);
        scores.push('');
        overallScores.push('');
      }
      dealerIndex = 0;
      renderDealer();
      show('screen-dealer');
    }

    function flushScores() {
      document.querySelectorAll('.score-input').forEach(inp => {
        const idx = parseInt(inp.dataset.index, 10);
        if (inp.classList.contains('overall')) overallScores[idx] = inp.value;
        else scores[idx] = inp.value;
      });
    }

    function reorderPlayers(from, to) {
      if (from === to) return;
      flushScores();
      function move(arr) { const [x] = arr.splice(from, 1); arr.splice(to, 0, x); }
      move(players); move(scores); move(overallScores);
      if (dealerIndex === from) dealerIndex = to;
      else if (from < to && dealerIndex > from && dealerIndex <= to) dealerIndex--;
      else if (from > to && dealerIndex >= to && dealerIndex < from) dealerIndex++;
      renderList();
    }

    function renderDealer() {
      flushScores();
      renderList();
    }

    function renderList() {
      const draggable = players.length > 2;

      // Rebuild column header to match the player row layout
      const header = document.getElementById('score-col-header');
      header.innerHTML = '';
      if (draggable) {
        const hs = document.createElement('span');
        hs.className = 'sch-handle-spacer';
        header.appendChild(hs);
      }
      [['sch-spacer', ''], ['sch-badge', ''], ['sch-label', 'Round'], ['sch-label overall', 'Total']].forEach(([cls, text]) => {
        const s = document.createElement('span');
        s.className = cls;
        s.textContent = text;
        header.appendChild(s);
      });

      const list = document.getElementById('player-list');
      list.innerHTML = '';

      players.forEach((name, i) => {
        const item = document.createElement('div');
        item.className = 'player-item' + (i === dealerIndex ? ' active' : '');
        item.dataset.playerIndex = i;

        if (draggable) {
          // Desktop: this item is a drop target
          item.addEventListener('dragover', e => {
            e.preventDefault();
            if (dragSrcIndex !== null && dragSrcIndex !== i) {
              document.querySelectorAll('.player-item').forEach(el => el.classList.remove('drag-over'));
              item.classList.add('drag-over');
            }
          });
          item.addEventListener('dragleave', e => {
            if (!item.contains(e.relatedTarget)) item.classList.remove('drag-over');
          });
          item.addEventListener('drop', e => {
            e.preventDefault();
            if (dragSrcIndex !== null && dragSrcIndex !== i) reorderPlayers(dragSrcIndex, i);
          });

          // Drag handle — drag is initiated only from here
          const handle = document.createElement('span');
          handle.className = 'drag-handle';
          handle.setAttribute('draggable', 'true');
          handle.setAttribute('aria-hidden', 'true');
          handle.textContent = '⠿';

          // Desktop DnD
          handle.addEventListener('dragstart', e => {
            dragSrcIndex = i;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setDragImage(item, 24, item.offsetHeight / 2);
            setTimeout(() => item.classList.add('dragging'), 0);
          });
          handle.addEventListener('dragend', () => {
            item.classList.remove('dragging');
            document.querySelectorAll('.player-item').forEach(el => el.classList.remove('drag-over'));
            dragSrcIndex = null;
          });

          // Touch DnD
          let touchTarget = null;
          handle.addEventListener('touchstart', () => {
            dragSrcIndex = i;
            touchTarget = null;
            item.classList.add('dragging');
          }, { passive: true });
          handle.addEventListener('touchmove', e => {
            e.preventDefault();
            const t = e.touches[0];
            const over = document.elementsFromPoint(t.clientX, t.clientY)
              .find(el => el.classList.contains('player-item') && el !== item);
            document.querySelectorAll('.player-item').forEach(el => el.classList.remove('drag-over'));
            touchTarget = over || null;
            if (touchTarget) touchTarget.classList.add('drag-over');
          }, { passive: false });
          handle.addEventListener('touchend', () => {
            item.classList.remove('dragging');
            document.querySelectorAll('.player-item').forEach(el => el.classList.remove('drag-over'));
            const target = touchTarget;
            touchTarget = null;
            dragSrcIndex = null;
            if (target) reorderPlayers(i, parseInt(target.dataset.playerIndex, 10));
          });

          item.appendChild(handle);
        }

        const nameSpan = document.createElement('span');
        nameSpan.className = 'player-name';
        nameSpan.textContent = name;

        const badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = 'Dealer';

        const scoreInput = document.createElement('input');
        scoreInput.type = 'number';
        scoreInput.className = 'score-input';
        scoreInput.dataset.index = i;
        scoreInput.placeholder = '0';
        scoreInput.inputMode = 'numeric';
        scoreInput.setAttribute('enterkeyhint', 'done');
        if (scores[i] !== '') scoreInput.value = scores[i];
        scoreInput.addEventListener('input', () => { scores[i] = scoreInput.value; });

        const overallInput = document.createElement('input');
        overallInput.type = 'number';
        overallInput.className = 'score-input overall';
        overallInput.dataset.index = i;
        overallInput.placeholder = '0';
        overallInput.inputMode = 'numeric';
        overallInput.setAttribute('enterkeyhint', 'done');
        if (overallScores[i] !== '') overallInput.value = overallScores[i];
        overallInput.addEventListener('input', () => { overallScores[i] = overallInput.value; });

        item.appendChild(nameSpan);
        item.appendChild(badge);
        item.appendChild(scoreInput);
        item.appendChild(overallInput);
        list.appendChild(item);
      });
    }

    function nextDealer() {
      dealerIndex = (dealerIndex + 1) % players.length;
      renderDealer();
    }
  </script>
</body>
</html>
